<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerollos Atnass | Professor Owl</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff; /* Blue for Personal */
            --danger: #f85149; /* Red for Offensive */
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
        }
        h1 { margin: 10px 0; font-size: 1.5rem; }
        p { color: #8b949e; margin-bottom: 30px; }
        
        .container { width: 100%; max-width: 400px; }
        
        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            margin: 20px 0 10px;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            font-weight: bold;
        }
        .link-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .offensive:hover { border-color: var(--danger); }

        .qr-section { margin-top: 30px; text-align: center; }
        img.qr { width: 150px; background: white; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <img src="https://github.com/kerollosatnass.png" alt="Professor Owl" class="profile-img">
    <h1>Kerollos Atnass</h1>
    <p>@ProfessorOwl | Offensive Security Engineer</p>

    <div class="container">
        <div class="section-title">Professional (Identity)</div>
        <a href="https://linkedin.com/in/kerollosatnass" class="link-card">LinkedIn</a>
        <a href="https://github.com/kerollosatnass" class="link-card">GitHub</a>
        <a href="https://medium.com/@kerollosatnass" class="link-card">Medium</a>

        <div class="section-title">Offensive (The Professor)</div>
        <a href="https://hackerone.com/professorowl" class="link-card offensive">HackerOne</a>
        <a href="https://bugcrowd.com/professorowl" class="link-card offensive">Bugcrowd</a>
        <a href="https://portswigger.net/users/professorowl" class="link-card offensive">PortSwigger</a>
        <a href="https://tryhackme.com/p/professorowl" class="link-card offensive">TryHackMe</a>

        <div class="section-title">Extra</div>
        <a href="https://chess.com/member/Professor_Owl_X" class="link-card">Chess.com ♟️</a>
    </div>

    <div class="qr-section">
        <p>Scan to connect</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://kerollosatnass.github.io/links/" alt="QR Code" class="qr">
    </div>

</body>
</html>
